name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/nsl-task-collection-bkejt9]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
      # Снимаем зависшие Pages-деплои предыдущих коммитов — иначе они
      # блокируют публикацию ошибкой «due to in progress deployment»
      - name: Cancel stuck Pages deployments
        run: |
          for sha in $(git log --format=%H -8 HEAD~1 2>/dev/null || true); do
            curl -s -o /dev/null -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages/deployments/$sha/cancel" || true
          done
      - run: sleep 10
      - id: deployment
        uses: actions/deploy-pages@v4
